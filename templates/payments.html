{% extends "base.html" %}

{% block content %}

<h2>Payments</h2>

<a href="/add_payment" class="button">Make Payment</a>

<table>
<tr>
    <th>ID</th>
    <th>Invoice ID</th>
    <th>Status</th>
</tr>

{% for p in payments %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>
        <span class="badge paid">
            {{ p[2] }}
        </span>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
