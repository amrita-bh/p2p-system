<!DOCTYPE html>
<html>
<head>
    <title>P2P System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
        }

        /* Navbar */
        .navbar {
            background-color: #2c3e50;
            padding: 12px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #1abc9c;
        }

        /* Container */
        .container {
            padding: 30px 60px;
        }

        h1 {
            color: #2c3e50;
        }

        h3 {
            color: #34495e;
        }

        /* Cards */
        .card {
            background: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0px 6px 15px rgba(0,0,0,0.15);
        }

        /* Buttons */
        .button {
            background-color: #3498db;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            margin-top: 8px;
        }

        .button:hover {
            background-color: #2980b9;
        }

        /* Links */
        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        /* Status Badges */
        .badge {
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .created { background-color: #3498db; }
        .received { background-color: #2ecc71; }
        .paid { background-color: #9b59b6; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            color: gray;
            font-size: 12px;
            margin-top: 20px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/vendors">Vendors</a>
    <a href="/requisitions">Requisitions</a>
    <a href="/pos">PO</a>
    <a href="/grs">GR</a>
    <a href="/invoices">Invoice</a>
    <a href="/payments">Payment</a>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    Procure-to-Pay System | Mini Project
</div>

</body>
</html>
