{% extends "base.html" %}

{% block content %}

<h2>Purchase Orders</h2>

<a href="/add_po" class="button">Create PO</a>

<table>
<tr>
    <th>ID</th>
    <th>Vendor</th>
    <th>Item</th>
    <th>Quantity</th>
    <th>Status</th>
</tr>

{% for p in pos %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>{{ p[2] }}</td>
    <td>{{ p[3] }}</td>
    <td>
        <span class="badge {{ p[4]|lower }}">
            {{ p[4] }}
        </span>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
